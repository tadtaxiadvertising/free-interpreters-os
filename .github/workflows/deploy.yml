name: 🚀 Auto-Deploy to Easypanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Easypanel Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Call Easypanel Webhook
        env:
          EASYPANEL_DEPLOY_WEBHOOK: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}
        run: |
          set -euo pipefail

          echo "Disparando despliegue automático en Easypanel..."

          WEBHOOK_URL="$(printf '%s' "${EASYPANEL_DEPLOY_WEBHOOK:-}" | tr -d '\r\n')"

          if [ -z "$WEBHOOK_URL" ]; then
            echo "❌ El secret EASYPANEL_DEPLOY_WEBHOOK no está configurado en GitHub Actions."
            echo "Configúralo con la URL completa del webhook de despliegue de Easypanel."
            exit 78
          fi

          if ! printf '%s' "$WEBHOOK_URL" | grep -Eq '^https?://'; then
            echo "❌ EASYPANEL_DEPLOY_WEBHOOK debe ser una URL completa que empiece con http:// o https://."
            exit 78
          fi

          RESPONSE=$(curl \
            --silent \
            --show-error \
            --location \
            --request POST \
            --output /dev/null \
            --write-out "%{http_code}" \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            "$WEBHOOK_URL")

          case "$RESPONSE" in
            200|201|202|204)
              echo "✅ Webhook enviado con éxito. Código HTTP: $RESPONSE"
              echo "Easypanel está compilando el nuevo build en segundo plano."
              ;;
            *)
              echo "❌ Error al disparar el webhook. Código HTTP recibido: $RESPONSE"
              exit 1
              ;;
          esac
