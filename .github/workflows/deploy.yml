name: 🚀 Auto-Deploy to Easypanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-interpreters:
    name: Deploy interpreters (Next.js)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Call Easypanel Webhook — interpreters
        run: |
          set -euo pipefail
          echo "Deploying interpreters (Next.js) to Easypanel..."
          WEBHOOK_URL="${EASYPANEL_WEBHOOK_INTERPRETERS:-}"
          WEBHOOK_URL="$(printf '%s' "$WEBHOOK_URL" | tr -d '\r\n')"
          if [ -z "$WEBHOOK_URL" ]; then
            echo "⚠️ WARNING: EASYPANEL_WEBHOOK_INTERPRETERS secret is not configured."
            echo "Skipping deployment. To enable auto-deploy, add the webhook URL from Easypanel in GitHub Settings > Secrets > Actions."
            exit 0
          fi
          if ! printf '%s' "$WEBHOOK_URL" | grep -Eq '^https?://'; then
            echo "ERROR: EASYPANEL_WEBHOOK_INTERPRETERS must be a valid URL starting with http:// or https://."
            exit 78
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --retry 3 --retry-delay 5 --retry-all-errors -X POST "$WEBHOOK_URL")
          case "$HTTP_CODE" in 200|201|202|204) echo "OK: interpreters deployed (HTTP $HTTP_CODE)";; *) echo "FAIL: interpreters webhook returned HTTP $HTTP_CODE"; exit 1;; esac
        env:
          EASYPANEL_WEBHOOK_INTERPRETERS: ${{ secrets.EASYPANEL_WEBHOOK_INTERPRETERS }}

  deploy-interpreters-api:
    name: Deploy interpreters-api (Backend)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Call Easypanel Webhook — interpreters-api
        run: |
          set -euo pipefail
          echo "Deploying interpreters-api (Backend) to Easypanel..."
          WEBHOOK_URL="${EASYPANEL_WEBHOOK_API:-}"
          WEBHOOK_URL="$(printf '%s' "$WEBHOOK_URL" | tr -d '\r\n')"
          if [ -z "$WEBHOOK_URL" ]; then
            echo "⚠️ WARNING: EASYPANEL_WEBHOOK_API secret is not configured."
            echo "Skipping deployment. To enable auto-deploy, add the webhook URL from Easypanel in GitHub Settings > Secrets > Actions."
            exit 0
          fi
          if ! printf '%s' "$WEBHOOK_URL" | grep -Eq '^https?://'; then
            echo "ERROR: EASYPANEL_WEBHOOK_API must be a valid URL starting with http:// or https://."
            exit 78
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --retry 3 --retry-delay 5 --retry-all-errors -X POST "$WEBHOOK_URL")
          case "$HTTP_CODE" in 200|201|202|204) echo "OK: interpreters-api deployed (HTTP $HTTP_CODE)";; *) echo "FAIL: interpreters-api webhook returned HTTP $HTTP_CODE"; exit 1;; esac
        env:
          EASYPANEL_WEBHOOK_API: ${{ secrets.EASYPANEL_WEBHOOK_API }}
